services:
  db:
    image: mariadb:11
    container_name: flashcards-db
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mariadb", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "-e", "SELECT 1" ]
      interval: 10s
      timeout: 30s
      retries: 20
      start_period: 60s
  backend:
    build: ./backend
    container_name: flashcards-backend
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    ports:
      - '${API_PORT:-8080}:${API_PORT:-8080}'
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
  frontend:
    build: ./frontend
    container_name: flashcards-frontend
    env_file:
      - .env
    ports:
      - '3000:80'
    depends_on:
      - backend
volumes:
  db_data:
