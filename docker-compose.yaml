services:
  db:
    image: mariadb:12
    container_name: flashcards-db
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    command: --innodb-buffer-pool-size=256M --max-connections=1000
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 15
  backend:
    build: ./backend
    image: ${DOCKER_USER}/online-flashcards-backend
    container_name: flashcards-backend
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    ports:
      - '${API_PORT:-8080}:${API_PORT:-8080}'
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
  frontend:
    build: ./frontend
    image: ${DOCKER_USER}/online-flashcards-frontend
    container_name: flashcards-frontend
    env_file:
      - .env
    ports:
      - '3000:80'
    depends_on:
      - backend
volumes:
  db_data:
